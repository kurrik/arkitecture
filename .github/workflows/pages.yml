name: Pages

# Publishes the static site in site/ to GitHub Pages.
# Before uploading it runs scripts/build-site.sh, which re-renders the example
# SVGs from their .ark sources and builds the WebAssembly module the Examples
# page loads for live editing — so a publish always reflects the current library.
# One-time setup: in repo Settings → Pages, set Source to "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build-site.sh'
      - '.github/workflows/pages.yml'
      # The site embeds the library (rendered examples + WASM), so a change to
      # the Go sources should republish too.
      - '**/*.go'
      - 'go.mod'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build site (render examples + WASM)
        run: ./scripts/build-site.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
