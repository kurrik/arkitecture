name: CI

on:
  push:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build CLI
        run: go build -o /dev/null ./cmd/arkitecture

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./wasm

      - name: Smoke-test CLI
        run: |
          go run ./cmd/arkitecture examples/simple.ark --validate-only
          go run ./cmd/arkitecture examples/annotated.ark --validate-only
