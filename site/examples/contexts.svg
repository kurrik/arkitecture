  <text x="69.5" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Ordering Context</text>
  <rect x="16" y="40" width="31" height="24" fill="white" stroke="black" stroke-width="1" shape-rendering="crispEdges" />
