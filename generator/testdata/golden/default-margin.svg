<svg xmlns="http://www.w3.org/2000/svg" width="176" height="24">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Node rectangles and labels -->
  <rect x="0" y="0" width="52" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="26" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Web App</text>
  <rect x="72" y="0" width="24" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="84" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">API</text>
  <rect x="116" y="0" width="60" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="146" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Database</text>

  <!-- Arrows -->
  <line x1="52" y1="12" x2="72" y2="12" stroke="black" stroke-width="1" marker-end="url(#arrowhead)" />
  <line x1="96" y1="12" x2="116" y2="12" stroke="black" stroke-width="1" marker-end="url(#arrowhead)" />
</svg>