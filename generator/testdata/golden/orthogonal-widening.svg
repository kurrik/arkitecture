<svg xmlns="http://www.w3.org/2000/svg" width="149" height="152">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Node rectangles and labels -->
  <rect x="0" y="0" width="78" height="152" fill="white" stroke="black" stroke-width="1" shape-rendering="crispEdges" />
  <text x="39" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Box</text>
  <rect x="20" y="44" width="38" height="24" fill="white" stroke="black" stroke-width="1" shape-rendering="crispEdges" />
  <text x="39" y="56" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Top</text>
  <rect x="20" y="88" width="38" height="24" fill="white" stroke="black" stroke-width="1" shape-rendering="crispEdges" />
  <text x="39" y="100" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Inner</text>
  <rect x="118" y="0" width="31" height="24" fill="white" stroke="black" stroke-width="1" shape-rendering="crispEdges" />
  <text x="133.5" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Peer</text>

  <!-- Arrows -->
  <polyline points="39,112 39,131.5 98,131.5 98,12 118,12" fill="none" stroke="black" stroke-width="1" shape-rendering="crispEdges" marker-end="url(#arrowhead)" />
</svg>