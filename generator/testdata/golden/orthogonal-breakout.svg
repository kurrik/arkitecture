<svg xmlns="http://www.w3.org/2000/svg" width="158" height="144">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Node rectangles and labels -->
  <rect x="0" y="0" width="79" height="144" fill="white" stroke="black" stroke-width="1" />
  <text x="39.5" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Container</text>
  <rect x="24" y="48" width="31" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="39.5" y="60" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Top</text>
  <rect x="24" y="96" width="31" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="39.5" y="108" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Item</text>
  <rect x="127" y="0" width="31" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="142.5" y="12" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">Peer</text>

  <!-- Arrows -->
