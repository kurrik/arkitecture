<svg xmlns="http://www.w3.org/2000/svg" width="136" height="80">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Node rectangles and labels -->
  <rect x="0" y="0" width="40" height="80" fill="white" stroke="black" stroke-width="1" />
  <rect x="8" y="8" width="24" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="20" y="20" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">A</text>
  <rect x="8" y="48" width="24" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="20" y="60" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">B</text>
  <rect x="56" y="0" width="80" height="40" fill="white" stroke="black" stroke-width="1" />
  <rect x="64" y="8" width="24" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="76" y="20" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">C</text>
  <rect x="104" y="8" width="24" height="24" fill="white" stroke="black" stroke-width="1" />
  <text x="116" y="20" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="12">D</text>

  <!-- Arrows -->
  <line x1="20" y1="32" x2="20" y2="48" stroke="black" stroke-width="1" marker-end="url(#arrowhead)" />
  <line x1="88" y1="20" x2="104" y2="20" stroke="black" stroke-width="1" marker-end="url(#arrowhead)" />
  <line x1="76" y1="20" x2="116" y2="20" stroke="black" stroke-width="1" marker-end="url(#arrowhead)" />
  <line x1="32" y1="20" x2="116" y2="32" stroke="black" stroke-width="1" marker-end="url(#arrowhead)" />
</svg>